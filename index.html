<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notes</title>
<style>
  :root {
    --bg: #ffffff; --surface-1: #f1efe8; --text-primary: #1a1a18;
    --text-secondary: #5f5e5a; --text-muted: #888780; --accent-text: #0c447c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface-1: #2c2c2a; --text-primary: #f1efe8;
      --text-secondary: #b4b2a9; --text-muted: #888780; --accent-text: #b5d4f4;
    }
  }
  body {
    margin: 0; padding: 2.5rem 1.5rem 4rem; background: var(--bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }
  main { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 23px; font-weight: 500; margin: 0 0 1.25rem; }
  a.note { display: block; background: var(--surface-1); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 10px; text-decoration: none; }
  a.note .t { font-size: 15px; font-weight: 500; color: var(--accent-text); margin: 0 0 2px; }
  a.note .d { font-size: 13px; color: var(--text-secondary); margin: 0; }
</style>
</head>
<body>
<main>
<h1>notes</h1>
<a class="note" href="sync-error-design/">
  <p class="t">How the sync loop fails</p>
  <p class="d">Two error classes, one bounded retry — plus how transient Postgres errors are kept from crashing the node.</p>
</a>
<a class="note" href="bufferatcap-deadlock-fix/">
  <p class="t">bufferAtCap, root blocks and the merge-demand exemption</p>
  <p class="d">Why a naive fetch-buffer cap can deadlock the merge, and the exemption that fixes it.</p>
</a>
</main>
</body>
</html>
